name: Supabase Ping

on:
  schedule:
    - cron: "0 3 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i \
            "${{ secrets.SUPABASE_URL }}/rest/v1/albums?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"